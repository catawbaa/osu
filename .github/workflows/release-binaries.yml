name: Release Binaries

on:
  push:
    tags:
      - 'cornflower*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: macos-latest
            rid: osx-x64
            archive: tar
          - os: macos-latest
            rid: osx-arm64
            archive: tar
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 8.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: >
          dotnet publish osu.Desktop
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -o publish/${{ matrix.rid }}

      - name: Archive (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath osu-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Archive (tar, Unix)
        if: matrix.archive == 'tar'
        run: |
          tar -czf osu-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz -C publish/${{ matrix.rid }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            osu-${{ github.ref_name }}-${{ matrix.rid }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
